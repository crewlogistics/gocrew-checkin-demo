<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>GoCrew Smart Check-In</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap');
:root{--navy:#1B2A4A;--teal:#0D7377;--gold:#C4972A;--emerald:#059669;--red:#DC2626;--gray:#F2F4F7;--dark:#0F172A}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;overflow-x:hidden}
body{font-family:'DM Sans',system-ui,-apple-system,sans-serif;background:linear-gradient(170deg,var(--gray) 0%,#E8ECF1 40%,#DFE7EF 100%);min-height:100vh;min-height:100dvh}
.mono{font-family:'DM Mono',monospace}
button{-webkit-appearance:none;appearance:none;font-family:'DM Sans',system-ui,sans-serif}

.header{background:linear-gradient(135deg,var(--navy),#243656);padding:max(env(safe-area-inset-top),20px) 24px 24px;position:relative;overflow:hidden}
.header::before{content:'';position:absolute;inset:0;opacity:.04;background-image:radial-gradient(circle at 2px 2px,white 1px,transparent 0);background-size:24px 24px}
.header-inner{position:relative;z-index:1}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--teal),rgba(13,115,119,.8));display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff}
.logo-text{color:#fff;font-size:17px;font-weight:700;letter-spacing:.5px}
.secure-badge{display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:6px;background:rgba(255,255,255,.08)}
.secure-dot{width:6px;height:6px;border-radius:50%;background:var(--emerald);animation:pulse 2s infinite}
.header h1{color:#fff;font-size:20px;font-weight:700}
.header-time{color:rgba(255,255,255,.5);font-size:11px;margin-top:4px;letter-spacing:.5px}

.tabs{display:flex;background:#fff;border-radius:14px;margin:16px 20px 0;padding:4px;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.tab{flex:1;padding:10px 6px;border-radius:10px;text-align:center;font-size:11px;font-weight:600;color:#8896A6;cursor:pointer;transition:all .2s;letter-spacing:.3px;border:none;background:transparent}
.tab.active{background:var(--navy);color:#fff;box-shadow:0 2px 8px rgba(27,42,74,.3)}

.main{padding:16px 20px 120px;max-width:420px;margin:0 auto}

.status-wrap{display:flex;justify-content:center;margin-bottom:16px}
.status-badge{display:inline-flex;align-items:center;gap:8px;padding:6px 16px;border-radius:20px}
.status-badge.ready{background:rgba(13,115,119,.1);border:1px solid rgba(13,115,119,.2)}
.status-badge.checked-in{background:rgba(5,150,105,.1);border:1px solid rgba(5,150,105,.2)}
.status-badge.checked-out{background:rgba(27,42,74,.08);border:1px solid rgba(27,42,74,.15)}
.status-dot{width:8px;height:8px;border-radius:50%}
.status-badge.ready .status-dot{background:var(--teal)}
.status-badge.checked-in .status-dot{background:var(--emerald);animation:pulse 2s infinite}
.status-badge.checked-out .status-dot{background:var(--navy)}
.status-label{font-size:11px;font-weight:700;letter-spacing:1.5px}
.status-badge.ready .status-label{color:var(--teal)}
.status-badge.checked-in .status-label{color:var(--emerald)}
.status-badge.checked-out .status-label{color:var(--navy)}

.card{background:#fff;border-radius:20px;padding:20px;box-shadow:0 2px 24px rgba(0,0,0,.06),0 0 0 1px rgba(0,0,0,.03);margin-bottom:16px}

.qr-wrapper{text-align:center;padding:24px 20px}
.qr-label{font-size:12px;color:#8896A6;margin-bottom:16px;letter-spacing:1px}
.qr-canvas-wrap{display:flex;justify-content:center}
.qr-canvas-wrap canvas{border-radius:12px;box-shadow:0 0 30px rgba(13,115,119,.15),0 4px 20px rgba(0,0,0,.1);display:block}
.qr-timer{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:12px;background:rgba(13,115,119,.08);color:var(--teal);font-size:10px;font-weight:600;margin-top:12px}

.wallet-pass{background:linear-gradient(145deg,var(--navy),#1e3a5f,var(--dark));border-radius:16px;overflow:hidden;color:#fff;position:relative;box-shadow:0 8px 32px rgba(0,0,0,.2);margin-bottom:16px}
.wallet-pass::before{content:'';position:absolute;top:0;right:0;width:120px;height:120px;background:radial-gradient(circle,rgba(13,115,119,.2),transparent 70%)}
.wp-strip{height:4px;background:linear-gradient(90deg,var(--teal),var(--gold),var(--teal))}
.wp-header{padding:16px 20px 12px;display:flex;justify-content:space-between;align-items:flex-start;position:relative}
.wp-logo{display:flex;align-items:center;gap:8px}
.wp-logo-icon{width:28px;height:28px;border-radius:6px;background:var(--teal);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff}
.wp-logo-text{font-size:14px;font-weight:700;letter-spacing:.5px}
.wp-type{font-size:10px;color:rgba(255,255,255,.5);letter-spacing:1.5px;font-weight:600}
.wp-body{padding:0 20px 16px}
.wp-name{font-size:22px;font-weight:700;margin-bottom:2px}
.wp-program{font-size:11px;color:rgba(255,255,255,.6);margin-bottom:16px}
.wp-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:16px}
.wp-field label{display:block;font-size:8px;color:rgba(255,255,255,.4);letter-spacing:1px;margin-bottom:2px;font-weight:600}
.wp-field span{font-size:13px;font-weight:600}
.wp-qr{background:#fff;border-radius:12px;padding:12px;text-align:center;margin:0 20px 16px}
.wp-qr canvas{border-radius:8px;display:block;margin:0 auto}
.wp-footer{padding:12px 20px 16px;border-top:1px dashed rgba(255,255,255,.15);display:flex;justify-content:space-between;align-items:center}
.wp-id{font-size:11px;color:rgba(255,255,255,.4)}
.wp-badge{font-size:9px;padding:3px 8px;border-radius:4px;background:rgba(5,150,105,.2);color:var(--emerald);font-weight:600;letter-spacing:.5px}

.wallet-buttons{display:flex;gap:10px;margin-bottom:16px}
.wallet-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:14px 8px;border-radius:12px;border:none;font-size:12px;font-weight:600;cursor:pointer;transition:transform .15s}
.wallet-btn:active{transform:scale(.97)}
.wallet-btn-apple{background:#000;color:#fff}
.wallet-btn-google{background:#fff;color:#1a1a1a;border:1px solid #e0e0e0}
.wallet-btn svg{width:20px;height:20px;flex-shrink:0}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid-item{padding:10px 12px;border-radius:10px;background:var(--gray)}
.grid-label{font-size:9px;font-weight:600;color:#8896A6;letter-spacing:1px;margin-bottom:3px}
.grid-value{font-size:12px;font-weight:600;color:var(--navy)}

.frs-badge{margin-top:12px;padding:8px 12px;border-radius:8px;background:rgba(13,115,119,.04);border:1px solid rgba(13,115,119,.1);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.frs-text{font-size:11px;color:var(--teal)}
.frs-layers{display:flex;gap:3px;margin-left:auto}
.frs-layer{width:14px;height:7px;border-radius:2px;background:var(--emerald)}

.crew-card{display:flex;align-items:center;gap:12px}
.crew-avatar{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,var(--navy),var(--teal));display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;color:#fff;flex-shrink:0}
.crew-name{font-size:15px;font-weight:700;color:var(--navy)}
.crew-program{font-size:12px;color:#8896A6}

.btn{width:100%;padding:16px;border-radius:14px;border:none;color:#fff;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:.3px;transition:transform .15s;margin-bottom:12px;display:block;text-align:center}
.btn:active{transform:scale(.98)}
.btn-checkin{background:linear-gradient(135deg,var(--teal),rgba(13,115,119,.85));box-shadow:0 4px 20px rgba(13,115,119,.25)}
.btn-checkout{background:linear-gradient(135deg,var(--navy),rgba(27,42,74,.85));box-shadow:0 4px 20px rgba(27,42,74,.2)}
.btn-scan{background:linear-gradient(135deg,var(--gold),#d4a235);box-shadow:0 4px 20px rgba(196,151,42,.25)}
.btn-secondary{background:transparent;color:var(--navy);border:2px solid #E2E8F0;box-shadow:none}

.geo-bar{display:flex;align-items:center;justify-content:center;gap:6px;padding:8px;margin-top:10px;border-radius:8px;background:rgba(5,150,105,.06);border:1px solid rgba(5,150,105,.15)}
.pulse-ring{width:10px;height:10px;border-radius:50%;background:var(--emerald);position:relative;flex-shrink:0}
.pulse-ring::after{content:'';position:absolute;inset:-4px;border-radius:50%;border:2px solid var(--emerald);animation:geopulse 2s infinite;opacity:.5}
.geo-text{font-size:11px;color:var(--emerald);font-weight:600}

.overlay{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;animation:fadeIn .3s ease;padding:24px}
.overlay.ci{background:linear-gradient(135deg,rgba(5,150,105,.96),rgba(13,115,119,.96))}
.overlay.co{background:linear-gradient(135deg,rgba(27,42,74,.96),rgba(13,115,119,.96))}
.ov-icon{width:72px;height:72px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;margin-bottom:20px;animation:scaleIn .4s ease}
.ov-title{color:#fff;font-size:24px;font-weight:700;text-align:center}
.ov-sub{color:rgba(255,255,255,.85);font-size:14px;margin-top:6px;text-align:center}
.ov-meta{margin-top:20px;padding:16px 20px;border-radius:12px;background:rgba(255,255,255,.1);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);width:100%;max-width:320px}
.ov-row{display:flex;justify-content:space-between;padding:4px 0}
.ov-label{color:rgba(255,255,255,.5);font-size:10px}
.ov-val{color:#fff;font-size:10px;font-weight:600}
.ov-wallets{margin-top:16px;display:flex;gap:8px;width:100%;max-width:320px}
.ov-wallets .wallet-btn{padding:12px 8px;font-size:11px}
.btn-continue{margin-top:20px;padding:14px 48px;border-radius:12px;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);color:#fff;font-size:15px;font-weight:600;cursor:pointer}

.scanner-box{background:#fff;border-radius:20px;overflow:hidden;box-shadow:0 2px 24px rgba(0,0,0,.06);margin-bottom:16px}
.scanner-box-hdr{padding:16px 20px;background:var(--navy);color:#fff;text-align:center}
.scanner-box-hdr h3{font-size:14px;font-weight:700;margin-bottom:4px}
.scanner-box-hdr p{font-size:11px;color:rgba(255,255,255,.6)}
#scanner-view{width:100%;aspect-ratio:1;background:#111;position:relative;overflow:hidden}
#scanner-view video{width:100%!important;height:100%!important;object-fit:cover!important;border-radius:0!important}
.scanner-crosshair{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:10}
.scanner-crosshair div{width:200px;height:200px;border:3px solid var(--gold);border-radius:12px;box-shadow:0 0 0 2000px rgba(0,0,0,.4)}

.complete-card{text-align:center;padding:24px}

.security-footer{text-align:center;margin-top:20px;padding:12px 0}
.security-footer p{font-size:9px;color:#A0AEC0;letter-spacing:1px;line-height:1.6}

.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:12px;font-size:13px;font-weight:600;color:#fff;z-index:200;animation:slideUp .3s ease;white-space:nowrap;max-width:90vw;text-align:center}
.toast.s{background:var(--emerald)}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes geopulse{0%{transform:scale(1);opacity:.5}100%{transform:scale(2);opacity:0}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scaleIn{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes slideUp{from{transform:translateX(-50%) translateY(20px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
</style>
</head>
<body>

<div id="app">
  <!-- Fallback while JS loads -->
  <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:40px">
    <div>
      <div style="width:48px;height:48px;border:3px solid #0D7377;border-top-color:transparent;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px"></div>
      <p style="font-size:14px;font-weight:600;color:#1B2A4A">Loading GoCrew Smart Check-In...</p>
      <p style="font-size:11px;color:#8896A6;margin-top:8px">If this screen persists, open this file directly in Safari or Chrome.</p>
    </div>
  </div>
</div>

<script>
// ── Config ──
var CREW = {
  name:"Andrea Tsakanikas", id:"GC-2026-04892", assignment:"ASG-TX-0312",
  property:"Marriott Courtyard Downtown", address:"300 E 4th St, Austin, TX 78701",
  propertyId:"PROP-TX-004", checkIn:"Mar 21, 2026", checkOut:"Mar 28, 2026",
  program:"Federal Infrastructure Deployment", roomType:"Single King",
  confirmation:"MCR-8847291", room:"412"
};
var FRS = { composite: Math.floor(Math.random()*12)+2 };
var state = "READY";
var activeTab = "checkin";
var showSuccess = null;
var qrTimer = 30;
var geoStatus = "Verifying...";
var scanActive = false;
var scanResult = null;
var toastMsg = null;
var toastTimer = null;
var qrAnimId = null;

function $(id){ return document.getElementById(id); }

function showToast(msg){
  toastMsg = msg;
  render();
  if(toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ toastMsg = null; render(); }, 2500);
}

// ── QR Drawing ──
function drawQR(id, sz, animated, seedVal){
  var el = $(id);
  if(!el) return;
  var c = el.getContext("2d");
  var s = sz || 300;
  el.width = s; el.height = s;
  el.style.width = Math.floor(s/2)+"px";
  el.style.height = Math.floor(s/2)+"px";
  var g = animated ? 25 : 21;
  var cs = s/g;
  var seed = seedVal || (42 + Math.floor(Date.now()/30000));
  function rnd(){ seed=(seed*16807)%2147483647; return(seed-1)/2147483646; }
  var pat = [];
  for(var y=0;y<g;y++){ pat[y]=[]; for(var x=0;x<g;x++){
    var tl=x<7&&y<7, tr=x>=g-7&&y<7, bl=x<7&&y>=g-7;
    if(tl||tr||bl){ var lx=tl?x:tr?x-(g-7):x, ly=tl?y:tr?y:y-(g-7);
      pat[y][x]=(lx===0||lx===6||ly===0||ly===6||(lx>=2&&lx<=4&&ly>=2&&ly<=4))?1:0;
    } else { pat[y][x]=rnd()>.5?1:0; }
  }}
  if(!animated){
    c.fillStyle="#FFF"; c.fillRect(0,0,s,s);
    for(var y2=0;y2<g;y2++) for(var x2=0;x2<g;x2++) if(pat[y2][x2]){
      c.fillStyle="#1B2A4A"; c.fillRect(x2*cs+.5,y2*cs+.5,cs-1,cs-1);
    }
    return;
  }
  if(qrAnimId) cancelAnimationFrame(qrAnimId);
  var frame=0;
  function draw(){
    frame++; var t=frame*.02;
    c.clearRect(0,0,s,s); c.fillStyle="#FFF"; c.fillRect(0,0,s,s);
    for(var y3=0;y3<g;y3++) for(var x3=0;x3<g;x3++) if(pat[y3][x3]){
      var d=Math.sqrt(Math.pow(x3-g/2,2)+Math.pow(y3-g/2,2));
      var w=Math.sin(t*2-d*.3)*.15;
      c.fillStyle="rgba(27,42,74,"+Math.max(.4,Math.min(1,.85+w))+")";
      c.fillRect(x3*cs+.5,y3*cs+.5,cs-1,cs-1);
    }
    c.save(); c.strokeStyle="#0D7377"; c.lineWidth=3; c.setLineDash([8,6]); c.lineDashOffset=-t*20;
    c.beginPath(); c.arc(s/2,s/2,s*.42,0,Math.PI*2); c.stroke(); c.restore();
    c.strokeStyle="#C4972A"; c.lineWidth=4; c.lineCap="round";
    var corners=[[0,0,1,1],[s,0,-1,1],[0,s,1,-1],[s,s,-1,-1]];
    for(var i=0;i<corners.length;i++){
      var p=corners[i];
      c.beginPath(); c.moveTo(p[0]+p[2]*4,p[1]+p[3]*4); c.lineTo(p[0]+p[2]*4,p[1]+p[3]*20);
      c.moveTo(p[0]+p[2]*4,p[1]+p[3]*4); c.lineTo(p[0]+p[2]*20,p[1]+p[3]*4); c.stroke();
    }
    if(state==="READY" && activeTab==="checkin") qrAnimId=requestAnimationFrame(draw);
  }
  draw();
}

// ── Geofence ──
function initGeo(){
  setTimeout(function(){ geoStatus="Verified - Within 50m"; render(); },1500);
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(
      function(p){ geoStatus="Verified - "+p.coords.latitude.toFixed(4)+", "+p.coords.longitude.toFixed(4); render(); },
      function(){ geoStatus="Verified - GPS simulated"; render(); },
      {enableHighAccuracy:true,timeout:5000}
    );
  }
}

// ── Timer ──
setInterval(function(){
  qrTimer--;
  if(qrTimer<=0){ qrTimer=30; if(state==="READY"&&activeTab==="checkin") drawQR("qr-main",400,true); }
  var el=document.getElementById("timer-val");
  if(el) el.textContent=qrTimer;
  var tel=document.getElementById("clock");
  if(tel) tel.textContent=new Date().toLocaleString("en-US",{dateStyle:"medium",timeStyle:"short"});
},1000);

// ── Actions ──
function switchTab(t){
  scanActive=false; scanResult=null;
  if(qrAnimId){ cancelAnimationFrame(qrAnimId); qrAnimId=null; }
  activeTab=t;
  render();
}

function doCheckIn(){
  state="CHECKING_IN"; render();
  setTimeout(function(){ state="CHECKED_IN"; showSuccess="in"; render(); },1200);
}
function doCheckOut(){
  state="CHECKING_OUT"; render();
  setTimeout(function(){ state="CHECKED_OUT"; showSuccess="out"; render(); },800);
}
function doSelfCheckIn(){
  scanResult="validating"; scanActive=false; render();
  setTimeout(function(){
    scanResult="success"; render();
    setTimeout(function(){ state="CHECKED_IN"; showSuccess="in"; scanResult=null; render(); },1500);
  },1500);
}
function dismiss(){ showSuccess=null; render(); }
function wallet(t){ showToast("Pass saved to "+(t==="apple"?"Apple":"Google")+" Wallet"); }

function startScan(){
  scanActive=true; render();
  // Try native camera via input on mobile
}

// ── Render ──
function render(){
  var now = new Date();
  var time = now.toLocaleString("en-US",{dateStyle:"medium",timeStyle:"short"});
  var token = "TKN-"+Math.random().toString(36).substr(2,8).toUpperCase();
  var h = '';

  // Header
  h+='<div class="header"><div class="header-inner">';
  h+='<div class="header-top"><div class="logo"><div class="logo-icon">G</div><span class="logo-text">GoCrew</span></div>';
  h+='<div class="secure-badge"><div class="secure-dot"></div><span class="mono" style="color:rgba(255,255,255,.7);font-size:11px">SECURE</span></div></div>';
  h+='<h1>Smart Check-In</h1>';
  h+='<p class="header-time mono" id="clock">'+time+'</p>';
  h+='</div></div>';

  // Tabs
  if(state==="READY"){
    h+='<div class="tabs">';
    h+='<button class="tab'+(activeTab==="checkin"?' active':'')+'" onclick="switchTab(\'checkin\')">QR Check-In</button>';
    h+='<button class="tab'+(activeTab==="wallet"?' active':'')+'" onclick="switchTab(\'wallet\')">Wallet Pass</button>';
    h+='<button class="tab'+(activeTab==="selfservice"?' active':'')+'" onclick="switchTab(\'selfservice\')">Self Check-In</button>';
    h+='</div>';
  }

  h+='<div class="main">';

  // Status
  var sc = state==="READY"||state==="CHECKING_IN"?"ready":state==="CHECKED_IN"||state==="CHECKING_OUT"?"checked-in":"checked-out";
  var sl = state==="READY"?"READY FOR CHECK-IN":state==="CHECKING_IN"?"VALIDATING...":state==="CHECKED_IN"?"CHECKED IN":state==="CHECKING_OUT"?"PROCESSING...":"CHECKED OUT";
  h+='<div class="status-wrap"><div class="status-badge '+sc+'"><div class="status-dot"></div><span class="status-label mono">'+sl+'</span></div></div>';

  // ═══ QR CHECK-IN TAB ═══
  if(activeTab==="checkin" && state==="READY"){
    h+='<div class="card qr-wrapper">';
    h+='<p class="mono qr-label">PRESENT TO FRONT DESK</p>';
    h+='<div class="qr-canvas-wrap"><canvas id="qr-main" width="400" height="400" style="width:200px;height:200px"></canvas></div>';
    h+='<p class="mono" style="font-size:11px;color:#A0AEC0;margin-top:12px">Token refreshes every 30s</p>';
    h+='<div class="qr-timer mono"><span id="timer-val">'+qrTimer+'</span>s until refresh</div>';
    h+='<div class="geo-bar"><div class="pulse-ring"></div><span class="geo-text mono">'+geoStatus+'</span></div>';
    h+='</div>';
  }

  // ═══ WALLET PASS TAB ═══
  if(activeTab==="wallet" && state==="READY"){
    h+='<div class="wallet-pass"><div class="wp-strip"></div>';

// ── Camera for Self Check-In ──
var camStream = null;
function initCamera(){
  var video = document.getElementById("cam-video");
  if(!video) return;
  if(navigator.mediaDevices && navigator.mediaDevices.getUserMedia){
    navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"},audio:false})
      .then(function(stream){
        camStream = stream;
        video.srcObject = stream;
        video.play();
      })
      .catch(function(err){
        console.log("Camera error:",err);
        // Camera denied - user can still use simulate button
      });
  }
}
function stopScan(){
  scanActive = false;
  if(camStream){ camStream.getTracks().forEach(function(t){t.stop()}); camStream=null; }
  render();
}

// ── Init ──
document.addEventListener("DOMContentLoaded", function(){
  initGeo();
  render();
});
// Fallback if DOMContentLoaded already fired
if(document.readyState !== "loading"){ initGeo(); render(); }
