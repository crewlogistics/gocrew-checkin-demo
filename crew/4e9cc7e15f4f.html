.logo-text{color:var(--brand-dark);font-size:17px;font-weight:700;letter-spacing:-0.02em;font-family:'Plus Jakarta Sans',sans-serif}
.secure-badge{display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:6px;background:rgba(32,51,25,0.15)}
.secure-dot{width:6px;height:6px;border-radius:50%;background:var(--brand-dark);animation:pulse 2s infinite}
.header h1{color:var(--brand-dark);font-size:20px;font-weight:700;font-family:'Plus Jakarta Sans',sans-serif;letter-spacing:-0.02em}
.header-time{color:rgba(32,51,25,0.6);font-size:11px;margin-top:4px;letter-spacing:.5px}

.tabs{display:flex;background:var(--surface-elevated);border-radius:var(--radius-card);margin:16px 20px 0;padding:4px;box-shadow:0 2px 12px rgba(0,0,0,.06);gap:2px}
.tab{flex:1;padding:10px 4px;border-radius:10px;text-align:center;font-size:10px;font-weight:600;color:var(--on-surface-faint);border:none;background:transparent;transition:all .2s;letter-spacing:.2px}

.main{padding:16px 20px 120px;max-width:420px;margin:0 auto}

.status-wrap{display:flex;justify-content:center;margin-bottom:16px}
.badge{display:inline-flex;align-items:center;gap:8px;padding:6px 16px;border-radius:20px}
.badge.ready{background:var(--brand-green-faint);border:1px solid rgba(156,200,82,0.2)}
.badge.in{background:var(--brand-green-faint);border:1px solid rgba(156,200,82,0.3)}
.badge.out{background:rgba(32,51,25,0.08);border:1px solid rgba(32,51,25,0.15)}
.badge-dot{width:8px;height:8px;border-radius:50%}

.badge.out .badge-dot{background:var(--brand-dark)}

.badge.ready .badge-text{color:var(--brand-green-muted)}

.ov-wallets{margin-top:16px;display:flex;gap:8px;width:100%;max-width:320px}

.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:var(--radius-card);font-size:13px;font-weight:700;color:var(--brand-green);z-index:200;animation:slideUp .3s ease;max-width:90vw;text-align:center;background:var(--brand-dark);box-shadow:0 4px 12px rgba(32,51,25,0.08);font-family:'Plus Jakarta Sans',sans-serif}

.footer{text-align:center;margin-top:20px;padding:12px 0}
.footer p{font-size:9px;color:var(--on-surface-faint);letter-spacing:1px;line-height:1.6}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes geopulse{0%{transform:scale(1);opacity:.5}100%{transform:scale(2);opacity:0}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scaleIn{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes slideUp{from{transform:translateX(-50%) translateY(20px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
</style>

// ── QR Drawing ──
function drawQR(id,sz,anim,sd){
  var el=$(id);if(!el)return;
  var ctx=el.getContext("2d");el.width=sz;el.height=sz;
  el.style.width=Math.floor(sz/2)+"px";el.style.height=Math.floor(sz/2)+"px";
  var g=anim?25:21,cs=sz/g,seed=sd||(42+Math.floor(Date.now()/30000));
  function r(){seed=(seed*16807)%2147483647;return(seed-1)/2147483646}
  var p=[];for(var y=0;y<g;y++){p[y]=[];for(var x=0;x<g;x++){
    var tl=x<7&&y<7,tr=x>=g-7&&y<7,bl=x<7&&y>=g-7;
    if(tl||tr||bl){var lx=tl?x:tr?x-(g-7):x,ly=tl?y:tr?y:y-(g-7);
      p[y][x]=(lx===0||lx===6||ly===0||ly===6||(lx>=2&&lx<=4&&ly>=2&&ly<=4))?1:0;
    }else{p[y][x]=r()>.5?1:0}
  }}
  if(!anim){ctx.fillStyle="#FFF";ctx.fillRect(0,0,sz,sz);
    for(var y2=0;y2<g;y2++)for(var x2=0;x2<g;x2++)if(p[y2][x2]){ctx.fillStyle="#203319";ctx.fillRect(x2*cs+.5,y2*cs+.5,cs-1,cs-1)}
    return}
  if(qrAnim)cancelAnimationFrame(qrAnim);
  var fr=0;function draw(){fr++;var t=fr*.02;ctx.clearRect(0,0,sz,sz);ctx.fillStyle="#FFF";ctx.fillRect(0,0,sz,sz);
    for(var y3=0;y3<g;y3++)for(var x3=0;x3<g;x3++)if(p[y3][x3]){var d=Math.sqrt(Math.pow(x3-g/2,2)+Math.pow(y3-g/2,2));
      ctx.fillStyle="rgba(32,51,25,"+Math.max(.4,Math.min(1,.85+Math.sin(t*2-d*.3)*.15))+")";ctx.fillRect(x3*cs+.5,y3*cs+.5,cs-1,cs-1)}
    ctx.save();ctx.strokeStyle="#9cc852";ctx.lineWidth=3;ctx.setLineDash([8,6]);ctx.lineDashOffset=-t*20;
    ctx.beginPath();ctx.arc(sz/2,sz/2,sz*.42,0,Math.PI*2);ctx.stroke();ctx.restore();
    ctx.strokeStyle="#EAB308";ctx.lineWidth=4;ctx.lineCap="round";
    [[0,0,1,1],[sz,0,-1,1],[0,sz,1,-1],[sz,sz,-1,-1]].forEach(function(c){
      ctx.beginPath();ctx.moveTo(c[0]+c[2]*4,c[1]+c[3]*4);ctx.lineTo(c[0]+c[2]*4,c[1]+c[3]*20);
      ctx.moveTo(c[0]+c[2]*4,c[1]+c[3]*4);ctx.lineTo(c[0]+c[2]*20,c[1]+c[3]*4);ctx.stroke()});
    if(state==="READY"&&tab==="checkin")qrAnim=requestAnimationFrame(draw)}
  draw()
}

var camRetries = 0;
function initCam(){
  camRetries++;
  var v=$("cam-v");
  if(!v){
    if(camRetries < 30) setTimeout(initCam, 200);
    return;
  }
  if(camStream){
    try{ v.srcObject=camStream; v.play(); }catch(e){}
    return;
  }
  // Show loading state
  showCamMsg("Requesting camera access...", false);
  
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
    showCamMsg("Camera not available. Use the Simulate button below, or open this page in Safari.", true);
    return;
  }
  
  // Request camera - try multiple approaches
  var constraints = [
    {video: {facingMode: {ideal: "environment"}}, audio: false},
    {video: {facingMode: "environment"}, audio: false},
    {video: true, audio: false}
  ];
  
  tryCamera(constraints, 0, v);
}

function tryCamera(list, idx, videoEl){
  if(idx >= list.length){
    showCamMsg("Camera access denied. Check your browser settings, or use the Simulate button below.", true);
    return;
  }
  navigator.mediaDevices.getUserMedia(list[idx]).then(function(stream){
    camStream = stream;
    var v = $("cam-v");
    if(v){
      v.srcObject = stream;
      v.play().then(function(){
        showCamMsg("", false); // Clear message on success
      }).catch(function(){
        showCamMsg("", false);
      });
    }
  }).catch(function(err){
    console.log("Camera attempt " + (idx+1) + " failed:", err.name);
    if(err.name === "NotAllowedError" || err.name === "PermissionDeniedError"){
      showCamMsg("Camera permission denied. Tap Allow when prompted, or go to Settings > Safari > Camera.", true);
    } else {
      tryCamera(list, idx + 1, videoEl);
    }
  });
}

function showCamMsg(msg, isError){
  var el = $("cam-error");
  if(!el) return;
  if(!msg){ el.innerHTML = ""; return; }
  var d = document.createElement("div");
  d.style.cssText = "position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:3;padding:20px";
  var inner = document.createElement("div");
  inner.style.textAlign = "center";
  if(isError){
    var p1 = document.createElement("p");
    p1.style.cssText = "font-size:13px;color:#DC2626;font-weight:600;margin-bottom:8px";
    p1.textContent = "Camera Issue";
    inner.appendChild(p1);
  }
  var p2 = document.createElement("p");
  p2.style.cssText = "font-size:12px;color:#ccc;line-height:1.5";
  p2.textContent = msg;
  inner.appendChild(p2);
  d.appendChild(inner);
  el.innerHTML = "";
  el.appendChild(d);
}

// Call the real API when checking in
function apiCheckIn(room) {
  if(!C) return;
  fetch(API_BASE + "/api/v1/checkin", {
    method: "POST",
    headers: {"Content-Type": "application/json", "X-API-Key": "gocrew-test-key-2026"},
    body: JSON.stringify({

      crew_id: C.id,
      room_number: room,
      latitude: crewLat,
      longitude: crewLng,
      scan_method: "QR_SCAN"
    })
  })
  .then(function(r) {
    if(!r.ok) {
      return r.json().then(function(err) {
        toast("Check-in issue: " + (err.message || "Please try again"));
        console.log("API check-in error:", err);
        return null;
      });
    }
    return r.json();
  })
  .then(function(data) {
    if(data && data.frs_score !== undefined) {
      frs = data.frs_score;
      console.log("API check-in OK:", data);
    }
  })
  .catch(function(err) {
    console.log("API unreachable:", err);
    toast("Offline mode - check-in saved locally");
  });
  
  // Also notify supervisor via ntfy (fallback)
  notifySupervisor("CHECKED_IN", room);
}

function submitRoomChange(){
  var newRoom = $("newroom-input") ? $("newroom-input").value.trim() : "";
  if(newRoom === ""){ toast("Please enter the new room number"); return; }
  if(!/^[0-9]+$/.test(newRoom)){ toast("Room number must be digits only"); return; }
  C.room = newRoom;
  overlay="req_sent";render();
  setTimeout(function(){overlay=null;toast("Room changed to " + newRoom + ". All records updated.");render()},2000);
}
function setRating(n){ feedbackRating = n; render(); }
function toggleTag(tag){
  var idx = feedbackTags.indexOf(tag);
  if(idx >= 0) feedbackTags.splice(idx, 1);
  else feedbackTags.push(tag);
  render();
}
function submitFeedback(){
  var text = $("feedback-text") ? $("feedback-text").value : "";
  apiFeedback(feedbackRating, feedbackTags, text);
  feedbackDone = true;
  render();
  toast("Feedback submitted. Thank you!");
}
function showTerms(){ overlay="terms"; render(); }
function showPrivacy(){ overlay="privacy"; render(); }
function showForm(type){overlay="form_"+type;render()}

document.addEventListener("DOMContentLoaded",function(){initGeo();render()});
if(document.readyState!=="loading"){initGeo();render()}
if("serviceWorker" in navigator){navigator.serviceWorker.register("sw.js").catch(function(){})}
